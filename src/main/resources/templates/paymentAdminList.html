<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Admin - Payment List</title></head>
<body>
<h2>All Payments (Admin)</h2>
<table border="1">
    <tr><th>Payment ID</th><th>Status</th><th>Action</th></tr>
    <tr th:each="payment : ${payments}">
        <td th:text="${payment.id}"></td>
        <td th:text="${payment.status}"></td>
        <td><a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}">View & Update Status</a></td>
    </tr>
</table>
</body>
</html>
