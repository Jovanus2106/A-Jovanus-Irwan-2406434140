<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Search Payment</title></head>
<body>
<h2>Search Payment Detail</h2>
<form onsubmit="event.preventDefault(); window.location.href='/payment/detail/' + document.getElementById('paymentId').value;">
    <label>Payment ID:</label>
    <input type="text" id="paymentId" required>
    <button type="submit">Search</button>
</form>
</body>
</html>
