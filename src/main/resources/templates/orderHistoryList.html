<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History List</title>
</head>
<body>
<h2>Order History for <span th:text="${author}"></span></h2>
<table border="1">
    <tr>
        <th>Order ID</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.status}"></td>
        <td>
            <a th:href="@{/order/pay/{id}(id=${order.id})}">Pay Order</a>
        </td>
    </tr>
</table>
<a href="/order/history">Back</a>
</body>
</html>
