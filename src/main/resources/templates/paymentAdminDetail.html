<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><title>Admin - Payment Action</title></head>
<body>
<h2>Payment Administration</h2>
<p>ID: <span th:text="${payment.id}"></span></p>
<p>Current Status: <span th:text="${payment.status}"></span></p>

<form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
    <label>New Status:</label>
    <select name="status">
        <option value="SUCCESS">SUCCESS</option>
        <option value="REJECTED">REJECTED</option>
    </select>
    <button type="submit">Update Status</button>
</form>
</body>
</html>
